<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Granteater's Prompt Quest</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  :root {
    --orange:#E8621A; --navy:#1B2A4A; --navy-light:#2A3F6F;
    --cream:#FFF8EE; --gold:#F5C842; --green:#3DBE6E; --red:#E84040;
    --phosphor:#00ff88; --monitor-bg:#0a1a0f;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--navy);font-family:'Nunito',sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .screen{display:none;width:100%;height:100vh;}
  .screen.active{display:flex;}
  #title-screen{flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#0d1b36 0%,#1B2A4A 60%,#2a1a0a 100%);position:relative;overflow:hidden;}
  .stars{position:absolute;inset:0;background-image:radial-gradient(1px 1px at 10% 20%,white,transparent),radial-gradient(1px 1px at 30% 10%,white,transparent),radial-gradient(1.5px 1.5px at 50% 30%,white,transparent);}
  .title-logo{font-family:'Press Start 2P',monospace;font-size:clamp(50px,3.5vw,32px);color:var(--gold);text-shadow:4px 4px 0 var(--orange),8px 8px 0 rgba(0,0,0,0.3);text-align:center;line-height:1.6;z-index:1;}
  .title-sub{font-size:clamp(12px,2vw,17px);color:var(--cream);margin-top:10px;opacity:0.8;z-index:1;}
  #title-gran{width:180px;height:auto;margin:20px 0;z-index:1;}
  .btn{font-family:'Press Start 2P',monospace;font-size:12px;padding:14px 28px;border:none;border-radius:4px;cursor:pointer;transition:transform 0.1s,box-shadow 0.1s;z-index:1;}
  .btn-sm{padding:8px 16px !important;font-size:10px !important;}
  .btn:active{transform:translateY(2px)!important;box-shadow:none!important;}
  .btn-primary{background:var(--orange);color:white;box-shadow:0 6px 0 #a04010;margin-top:28px;}
  .btn-primary:hover{background:#ff7830;box-shadow:0 8px 0 #a04010;transform:translateY(-2px);}
  #game-screen{flex-direction:column;position:relative;}
  #hud{width:100%;height:44px;background:var(--navy);display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:3px solid var(--navy-light);z-index:10;flex-shrink:0;}
  .hud-level{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--gold);}
  .hud-info{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--cream);display:flex;gap:16px;align-items:center;}
  #canvas-container{position:relative;flex:1;overflow:hidden;}
  canvas{display:block;width:100%;height:100%;}
  #touch-controls{position:absolute;bottom:0;left:0;right:0;height:110px;display:flex;align-items:flex-end;justify-content:center;padding:12px 16px;z-index:50;pointer-events:none;}
  .touch-btn{width:60px;height:60px;background:rgba(255,255,255,0.18);border:2px solid rgba(255,255,255,0.35);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;color:white;pointer-events:all;user-select:none;-webkit-user-select:none;touch-action:manipulation;cursor:pointer;}
  .touch-btn:active{background:rgba(232,98,26,0.5);border-color:#E8621A;}
  .touch-left-group{display:flex;margin-bottom:40px;gap:10px;align-items:flex-end;}
  .popup-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity 0.25s;}
  .popup-overlay.show{opacity:1;pointer-events:all;}
  .popup{background:var(--cream);border:4px solid var(--navy);border-radius:12px;padding:24px 28px;max-width:560px;width:92%;box-shadow:8px 8px 0 var(--navy);animation:popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);max-height:88vh;overflow-y:auto;}
  @keyframes popIn{from{transform:scale(0.75);opacity:0}to{transform:scale(1);opacity:1}}
  .popup-tag{font-family:'Press Start 2P',monospace;font-size:9px;color:white;background:var(--orange);padding:4px 10px;border-radius:4px;display:inline-block;margin-bottom:10px;}
  .popup h2{font-family:'Press Start 2P',monospace;font-size:12px;color:var(--navy);margin-bottom:10px;line-height:1.6;}
  .popup p{font-size:14px;color:#444;line-height:1.7;margin-bottom:10px;}
  .example{background:var(--navy);color:var(--gold);padding:10px 14px;border-radius:6px;font-size:13px;font-style:italic;margin-bottom:14px;line-height:1.6;}
  .rice-badge{display:inline-block;font-family:'Press Start 2P',monospace;font-size:9px;padding:3px 8px;border-radius:4px;margin-right:4px;}
  .rice-r{background:#ffeded;color:#c00;border:1px solid #c00;}
  .rice-i{background:#fff3e0;color:#b85c00;border:1px solid #b85c00;}
  .rice-c{background:#e8f5e9;color:#1b5e20;border:1px solid #1b5e20;}
  .rice-e{background:#e3f2fd;color:#0d47a1;border:1px solid #0d47a1;}
  .task-popup{max-width:700px;}
  .scenario-box{background:#f0f4ff;border-left:4px solid var(--navy);padding:12px 16px;border-radius:0 6px 6px 0;margin-bottom:14px;font-size:13px;color:#333;line-height:1.6;}
  .prompt-options{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
  .prompt-option{background:white;border:3px solid var(--navy-light);border-radius:8px;padding:12px 16px;cursor:pointer;font-size:13px;color:#333;line-height:1.6;transition:border-color 0.15s,background 0.15s;text-align:left;}
  .prompt-option:hover{border-color:var(--orange);background:#fff5ee;}
  .prompt-option.correct{border-color:var(--green);background:#efffef;}
  .prompt-option.wrong{border-color:var(--red);background:#fff0f0;}
  .prompt-option.disabled{pointer-events:none;}
  .feedback-box{padding:12px 16px;border-radius:8px;font-size:13px;line-height:1.6;display:none;}
  .feedback-box.show{display:block;}
  .feedback-box.good{background:#efffef;border:2px solid var(--green);color:#1a5c2a;}
  .feedback-box.bad{background:#fff0f0;border:2px solid var(--red);color:#7a1010;}
  .score-display{font-family:'Press Start 2P',monospace;font-size:28px;color:var(--orange);margin:14px 0;}
  #controls-hint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-family:'Press Start 2P',monospace;font-size:9px;color:rgb(255,255,255);z-index:5;pointer-events:none;text-align:center;white-space:nowrap;}
  .mission-popup{max-width:580px;}
  .rice-build-step{background:white;border:2px solid #ddd;border-radius:8px;padding:12px;margin-bottom:10px;}
  .rice-build-step.active{border-color:var(--orange);background:#fff8f4;}
  .rice-build-step.done{border-color:var(--green);background:#f0fff4;}
  .prompt-preview{font-family:monospace;background:var(--navy);color:var(--gold);padding:10px 14px;border-radius:6px;font-size:12px;line-height:1.8;margin:10px 0;white-space:pre-wrap;}
  #bucket-hud{position:absolute;top:8px;left:50%;transform:translateX(-50%);display:none;align-items:center;gap:20px;z-index:20;font-family:'Press Start 2P',monospace;font-size:9px;}
  #bucket-hud.show{display:flex;}
  .hearts{color:#E84040;letter-spacing:2px;font-size:14px;}
  .card-counter{color:var(--gold);}
  #feedback-flash{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:90;pointer-events:none;opacity:0;transition:opacity 0.15s;}
  #feedback-flash .flash-box{background:rgba(0,0,0,0.75);border-radius:16px;padding:20px 36px;text-align:center;}
  #feedback-flash .flash-icon{font-size:48px;display:block;}
  #feedback-flash .flash-text{font-family:'Press Start 2P',monospace;font-size:11px;color:white;margin-top:8px;line-height:1.6;}
  #feedback-flash .flash-reason{font-family:'Nunito',sans-serif;font-size:13px;color:rgba(255,255,255,0.85);margin-top:6px;}

  /* LEVEL 2 MONITOR SCREEN */

  /* Outer container — the room around the monitor */
  #l2-screen {
    display: none;
    flex-direction: column;
    width: 100%; height: 100%;
    background: #1a1a2e;
    background-image:
      radial-gradient(ellipse at 30% 60%, rgba(60,30,80,0.4) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 30%, rgba(20,40,80,0.4) 0%, transparent 60%);
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    font-family: 'Nunito', sans-serif;
    padding: 20px;
    gap: 0;
  }

  /* Monitor shell */
  .l2-monitor {
    width: 100%;
    max-width: 960px;
    height: 100%;
    max-height: calc(100% - 0px);
    display: flex;
    flex-direction: column;
    background: #2a2040;
    border-radius: 18px;
    box-shadow:
      0 0 0 3px #3a3060,
      0 0 0 8px #1a1428,
      0 8px 40px rgba(0,0,0,0.8),
      0 0 60px rgba(120,80,255,0.1);
    overflow: hidden;
    position: relative;
  }

  /* Monitor top bar (like a browser/app chrome) */
  .l2-monitor-chrome {
    background: linear-gradient(180deg, #3a3060 0%, #2e2550 100%);
    height: 32px;
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 8px;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .l2-chrome-dot {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .l2-chrome-dot.red   { background: #ff5f57; }
  .l2-chrome-dot.amber { background: #febc2e; }
  .l2-chrome-dot.green { background: #28c840; }
  .l2-chrome-title {
    flex: 1;
    text-align: center;
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 1px;
    margin-right: 38px; /* offset the dots */
  }

  /* Screen area inside monitor */
  .l2-screen-inner {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #0d0d1a;
    overflow: hidden;
    position: relative;
  }
  /* Subtle scanlines */
  .l2-screen-inner::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px);
    pointer-events: none;
    z-index: 10;
  }

  /* Task bar */
  .l2-task-bar {
    background: rgba(18,12,36,0.98);
    border-bottom: 1px solid rgba(150,100,255,0.25);
    padding: 10px 18px;
    flex-shrink: 0;
  }
  .l2-task-label {
    font-size: 9px;
    color: rgba(180,140,255,0.5);
    letter-spacing: 2px;
    margin-bottom: 3px;
    font-family: 'Press Start 2P', monospace;
  }
  .l2-task-text {
    font-size: clamp(14px,1.8vw,18px);
    color: #e8e0ff;
    line-height: 1.5;
    font-weight: 700;
  }
  .l2-progress {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 5px;
    font-size: 10px;
    color: rgba(180,140,255,0.45);
    font-family: 'Share Tech Mono', monospace;
  }
  .l2-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    border: 1.5px solid rgba(180,140,255,0.3);
    background: transparent;
    display: inline-block;
  }
  .l2-dot.active { background: #a070ff; border-color: #a070ff; box-shadow: 0 0 6px #a070ff; }
  .l2-dot.done   { background: rgba(160,112,255,0.3); border-color: rgba(160,112,255,0.3); }
  .l2-score-running { margin-left: auto; color: var(--gold); font-family: 'Press Start 2P', monospace; font-size: 8px; }

  /* COLUMN LAYOUT: RICE headers across top, cards below */
  .l2-board {
    flex: 1;
    overflow-y: auto;
    padding: 12px 14px 8px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* Column headers row */
  .l2-col-headers {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 8px;
    flex-shrink: 0;
  }
  .l2-col-header {
    background: rgba(120,80,255,0.12);
    border: 1px solid rgba(120,80,255,0.3);
    border-radius: 8px 8px 0 0;
    padding: 6px 8px;
    text-align: center;
    border-bottom: 2px solid rgba(120,80,255,0.4);
  }
  .l2-col-header.done {
    background: rgba(245,200,66,0.1);
    border-color: rgba(245,200,66,0.4);
    border-bottom-color: var(--gold);
  }
  .l2-col-letter {
    font-family: 'Press Start 2P', monospace;
    font-size: 16px;
    color: #a070ff;
    text-shadow: 0 0 10px rgba(160,112,255,0.5);
    line-height: 1;
  }
  .l2-col-header.done .l2-col-letter { color: var(--gold); text-shadow: 0 0 10px rgba(245,200,66,0.5); }
  .l2-col-sublabel {
    font-size: 11px;
    color: rgba(180,140,255,0.45);
    margin-top: 2px;
    font-family: 'Share Tech Mono', monospace;
  }
  .l2-col-header.done .l2-col-sublabel { color: rgba(245,200,66,0.55); }

  /* Cards grid — 4 columns, cards stack vertically per column */
  .l2-cards-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    flex: 1;
  }

  /* One column of cards */
  .l2-col-cards {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* Individual card with 3D flip */
  .l2-card-wrap {
    perspective: 700px;
    height: clamp(70px, 11vh, 100px);
    cursor: pointer;
  }
  .l2-card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(0.4, 0.2, 0.2, 1);
    border-radius: 8px;
  }
  /* Hover or selected flips the card */
  .l2-card-wrap:hover .l2-card-inner,
  .l2-card-wrap.selected .l2-card-inner {
    transform: rotateY(180deg);
  }
  .l2-card-wrap.selected .l2-card-face-front {
    box-shadow: 0 0 0 2px var(--orange), 0 0 16px rgba(232,98,26,0.4);
  }

  .l2-card-face-back,
  .l2-card-face-front {
    position: absolute;
    inset: 0;
    border-radius: 8px;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Card back — deep purple with Granteater watermark */
  .l2-card-face-back {
    background: linear-gradient(135deg, #2a1a4a 0%, #1a0f30 50%, #2a1a4a 100%);
    border: 1.5px solid rgba(160,112,255,0.3);
    flex-direction: column;
    gap: 4px;
  }
  .l2-card-back-pattern {
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(45deg, transparent, transparent 8px, rgba(120,80,255,0.04) 8px, rgba(120,80,255,0.04) 9px),
      repeating-linear-gradient(-45deg, transparent, transparent 8px, rgba(120,80,255,0.04) 8px, rgba(120,80,255,0.04) 9px);
  }
  .l2-card-gran {
    width: 52%;
    height: auto;
    opacity: 0.55;
    filter: saturate(0.6) brightness(1.1);
    position: relative;
    z-index: 1;
  }
  .l2-card-back-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 6px;
    color: rgba(160,112,255,0.4);
    letter-spacing: 1px;
    position: relative;
    z-index: 1;
  }

  /* Card front */
  .l2-card-face-front {
    background: rgba(14,10,26,0.97);
    border: 1.5px solid rgba(120,80,255,0.3);
    transform: rotateY(180deg);
    padding: 8px;
    flex-direction: column;
    gap: 4px;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .l2-card-wrap:hover .l2-card-face-front {
    border-color: rgba(232,98,26,0.6);
  }
  .l2-card-front-text {
    font-family: 'Nunito', sans-serif;
    font-size: clamp(14px, 1.8vw, 16px);
    color: #d4ccf0;
    line-height: 1.4;
    text-align: center;
  }

  /* Bottom assembled prompt */
  .l2-bottom {
    background: rgba(10,8,20,0.98);
    border-top: 1px solid rgba(120,80,255,0.15);
    padding: 10px 14px;
    flex-shrink: 0;
  }
  .l2-assembled {
    background: rgba(20,14,40,0.9);
    border: 1px solid rgba(120,80,255,0.2);
    border-radius: 8px;
    padding: 8px 12px;
    margin-bottom: 8px;
  }
  .l2-assembled-label {
    font-size: 8px;
    color: rgba(160,120,255,0.4);
    letter-spacing: 1px;
    margin-bottom: 4px;
    font-family: 'Press Start 2P', monospace;
  }
  .l2-assembled-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(10px,1.2vw,12px);
    color: var(--gold);
    line-height: 1.6;
  }
  .l2-assembled-placeholder {
    font-size: 11px;
    color: rgba(160,120,255,0.2);
    font-style: italic;
    text-align: center;
    padding: 4px;
  }
  .l2-submit-btn {
    width: 100%;
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    padding: 11px;
    background: var(--orange);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    box-shadow: 0 5px 0 #a04010;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .l2-submit-btn:hover { background: #ff7830; transform: translateY(-2px); box-shadow: 0 7px 0 #a04010; }
  .l2-submit-btn:active { transform: translateY(2px); box-shadow: none; }
  .l2-submit-btn.disabled { background: rgba(120,80,255,0.1); color: rgba(180,140,255,0.25); box-shadow: none; cursor: not-allowed; }

  /* Feedback */
  .l2-feedback-screen { padding: 10px 14px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
  .l2-feedback-header { text-align: center; padding: 6px; }
  .l2-feedback-title { font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--gold); margin-bottom: 6px; }
  .l2-feedback-bar-wrap { background: rgba(255,255,255,0.07); border-radius: 20px; height: 8px; overflow: hidden; }
  .l2-feedback-bar { height: 100%; border-radius: 20px; transition: width 0.6s ease; }
  .l2-feedback-rows { display: flex; flex-direction: column; gap: 7px; }
  .l2-feedback-row { background: rgba(20,14,40,0.8); border-radius: 8px; padding: 8px 10px; }
  .l2-feedback-row-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .l2-feedback-letter { font-family: 'Press Start 2P', monospace; font-size: 9px; color: white; padding: 3px 7px; border-radius: 4px; }
  .l2-feedback-label { font-family: 'Nunito', sans-serif; font-size: 12px; color: rgba(180,140,255,0.7); font-weight: 700; }
  .l2-feedback-score { margin-left: auto; font-size: 11px; font-family: 'Nunito', sans-serif; font-weight: 700; }
  .l2-feedback-selected { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--gold); margin-bottom: 3px; }
  .l2-feedback-reason { font-family: 'Nunito', sans-serif; font-size: 12px; color: rgba(255,255,255,0.65); line-height: 1.5; }

  /* Complete */
  .l2-complete { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; gap: 10px; height: 100%; }
  .l2-complete-icon { font-size: 52px; }
  .l2-complete-score { font-family: 'Press Start 2P', monospace; font-size: 36px; color: var(--gold); text-shadow: 0 0 20px var(--gold); }
  .l2-complete-max { font-size: 18px; color: rgba(160,112,255,0.5); }
  .l2-complete-msg { font-family: 'Nunito', sans-serif; font-size: 14px; color: #d4ccf0; text-align: center; max-width: 400px; line-height: 1.6; }
  .l2-prompt-result { display: flex; align-items: center; gap: 12px; width: 100%; max-width: 340px; font-family: 'Nunito', sans-serif; font-size: 13px; color: rgba(180,140,255,0.7); }
  .l2-mini-bar-wrap { flex: 1; background: rgba(255,255,255,0.07); border-radius: 10px; height: 8px; overflow: hidden; }
  .l2-mini-bar { height: 100%; border-radius: 10px; }
  .l2-rice-reminder { background: rgba(0,0,0,0.3); border: 1px solid rgba(120,80,255,0.2); border-radius: 8px; padding: 10px 14px; font-size: 12px; }

  #level-select-screen { overflow-y: auto; }
  .ls-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 14px 18px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    text-align: left;
    width: 100%;
    font-family: 'Nunito', sans-serif;
  }
  .ls-btn:hover { background: rgba(232,98,26,0.15); border-color: var(--orange); }
  .ls-btn-num {
    font-family: 'Press Start 2P', monospace;
    font-size: 16px;
    color: var(--gold);
    min-width: 28px;
    text-align: center;
  }
  .ls-btn-info { flex: 1; }
  .ls-btn-title { font-weight: 900; font-size: 15px; color: white; margin-bottom: 2px; }
  .ls-btn-desc { font-size: 12px; color: rgba(255,255,255,0.5); }

// LEVEL 1: SORT LEVEL DRAWING
// ═══════════════════════════════════════
const BUCKET_W  = () => Math.min(W * 0.28, 200);
const BUCKET_H  = () => Math.min(H * 0.20, 110);
const BUCKET_Y  = () => GY() - BUCKET_H() + 10;
const L_BUCKET_CX = () => W * 0.18;
const R_BUCKET_CX = () => W * 0.82;
const CARD_W    = () => Math.min(W * 0.52, 340);
const CARD_H    = () => Math.min(H * 0.22, 120);

function drawBucketTooltip(cx, bottomY, bw, title, lines, borderColor, bgColor, highlighted) {
  const padX = 12, padY = 10, lineH = 16;
  const tw = Math.min(bw + 20, 220);
  const th = padY*2 + 18 + lines.length * lineH + 4;
  const tx = cx - tw/2;
  const ty = bottomY - th - 10;

  ctx.save();
  ctx.globalAlpha = highlighted ? 1.0 : 0.82;

  // Drop shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath(); ctx.roundRect(tx+3, ty+3, tw, th, 8); ctx.fill();

  // Card background
  ctx.fillStyle = bgColor;
  ctx.strokeStyle = borderColor;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(tx, ty, tw, th, 8); ctx.fill(); ctx.stroke();

  // Title
  ctx.fillStyle = borderColor;
  ctx.font = 'bold 10px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(title, cx, ty + padY);

  // Lines
  ctx.fillStyle = '#333';
  ctx.font = '11px Nunito';
  ctx.textAlign = 'left';
  lines.forEach((l, i) => {
    ctx.fillText(l, tx + padX, ty + padY + 20 + i * lineH);
  });

  // Pointer triangle
  ctx.fillStyle = bgColor;
  ctx.strokeStyle = borderColor;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx - 8, bottomY - 10);
  ctx.lineTo(cx + 8, bottomY - 10);
  ctx.lineTo(cx,     bottomY - 2);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  ctx.restore();
}

function scaleBucketColor(hex, factor) {
  const r = Math.min(255, Math.round(parseInt(hex.slice(1,3),16) * factor));
  const g = Math.min(255, Math.round(parseInt(hex.slice(3,5),16) * factor));
  const b = Math.min(255, Math.round(parseInt(hex.slice(5,7),16) * factor));
  return `rgb(${r},${g},${b})`;
}

function drawBucket(cx, y, bw, bh, label, sublabel, color, glowActive) {
  const x = cx - bw/2;
  const dx = Math.round(bw * 0.14);
  const dy = Math.round(bw * 0.07);
  const rimH = 11;

  if (glowActive) { ctx.shadowColor = color; ctx.shadowBlur = 22; }

  // Drop shadow under whole box
  ctx.fillStyle = 'rgba(0,0,0,0.30)';
  ctx.beginPath();
  ctx.ellipse(cx + dx/2, y + bh + 6, bw*0.48, 8, 0, 0, Math.PI*2);
  ctx.fill();

  // Right side face (darkest)
  ctx.fillStyle = scaleBucketColor(color, 0.42);
  ctx.beginPath();
  ctx.moveTo(x+bw,    y);
  ctx.lineTo(x+bw+dx, y-dy);
  ctx.lineTo(x+bw+dx, y+bh-dy);
  ctx.lineTo(x+bw,    y+bh);
  ctx.closePath();
  ctx.fill();

  // Top face (lighter — open bin interior)
  ctx.fillStyle = scaleBucketColor(color, 0.55);
  ctx.beginPath();
  ctx.moveTo(x,       y);
  ctx.lineTo(x+bw,    y);
  ctx.lineTo(x+bw+dx, y-dy);
  ctx.lineTo(x+dx,    y-dy);
  ctx.closePath();
  ctx.fill();

  // Front face
  ctx.shadowBlur = 0;
  ctx.fillStyle = color;
  ctx.fillRect(x, y, bw, bh);

  // Left-edge highlight on front face
  const hl = ctx.createLinearGradient(x, y, x + bw*0.4, y);
  hl.addColorStop(0, 'rgba(255,255,255,0.20)');
  hl.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = hl;
  ctx.fillRect(x, y, bw, bh);

  // Bottom-edge shadow on front face
  const sh = ctx.createLinearGradient(x, y+bh-24, x, y+bh);
  sh.addColorStop(0, 'rgba(0,0,0,0)');
  sh.addColorStop(1, 'rgba(0,0,0,0.28)');
  ctx.fillStyle = sh;
  ctx.fillRect(x, y, bw, bh);

  // Front rim strip (bright highlight at top of front face)
  ctx.fillStyle = scaleBucketColor(color, 1.9);
  ctx.fillRect(x, y, bw, rimH);

  // Top rim strip (connects front rim to back, same brightness)
  ctx.fillStyle = scaleBucketColor(color, 2.0);
  ctx.beginPath();
  ctx.moveTo(x,       y);
  ctx.lineTo(x+bw,    y);
  ctx.lineTo(x+bw+dx, y-dy);
  ctx.lineTo(x+dx,    y-dy);
  ctx.closePath();
  ctx.fill();

  // Right rim edge
  ctx.fillStyle = scaleBucketColor(color, 1.5);
  ctx.beginPath();
  ctx.moveTo(x+bw,        y);
  ctx.lineTo(x+bw+dx,     y-dy);
  ctx.lineTo(x+bw+dx,     y-dy+rimH);
  ctx.lineTo(x+bw,        y+rimH);
  ctx.closePath();
  ctx.fill();

  // Thin outline on front face
  ctx.strokeStyle = 'rgba(0,0,0,0.30)';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(x, y, bw, bh);

  // Label
  ctx.fillStyle = 'white';
  ctx.font = 'bold 11px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 4;
  ctx.fillText(label, cx, y + bh * 0.42);
  ctx.font = 'bold 10px Nunito';
  ctx.fillStyle = 'rgba(255,255,255,0.90)';
  ctx.fillText(sublabel, cx, y + bh * 0.68);
  ctx.shadowBlur = 0;
}

function drawFallingCard(card, cy) {
  const cw = CARD_W(), ch = CARD_H();
  const cx = GS.cardX, x = cx - cw/2, y = cy - ch/2;
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(x+6, y+6, cw, ch);
  // card
  ctx.fillStyle = '#FFFDF5';
  ctx.strokeStyle = '#c8c0b0';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(x, y, cw, ch, 8); ctx.fill(); ctx.stroke();
  // top accent bar
  ctx.fillStyle = '#E8E0D0';
  ctx.beginPath(); ctx.roundRect(x, y, cw, 10, [8,8,0,0]); ctx.fill();
  // keyword pill — sized to fit text
  const kwText = card.keyword.toUpperCase();
  ctx.font = 'bold 9px "Press Start 2P"';
  const pillPad = 14;
  const pillW = ctx.measureText(kwText).width + pillPad * 2;
  const pillX = x + 12;
  ctx.fillStyle = '#1B2A4A';
  ctx.beginPath(); ctx.roundRect(pillX, y+16, pillW, 20, 10); ctx.fill();
  ctx.fillStyle = '#F5C842';
  ctx.textAlign = 'center';
  ctx.fillText(kwText, pillX + pillW / 2, y+30);
  // task text — wrap to fit card
  ctx.fillStyle = '#222';
  ctx.font = 'bold 16px Nunito';
  ctx.textAlign = 'center';
  const words = card.text.split(' ');
  let line = '', lines2 = [], maxW = cw - 32;
  words.forEach(w => {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxW && line) { lines2.push(line); line = w; }
    else line = test;
  });
  lines2.push(line);
  const lineH = 18, textY = y + 50;
  lines2.forEach((l, i) => ctx.fillText(l, cx, textY + i * lineH));
}

function drawSortLevel(dt) {
  const gy = GY();
  const bw = BUCKET_W(), bh = BUCKET_H(), by = BUCKET_Y();
  const lcx = L_BUCKET_CX(), rcx = R_BUCKET_CX();
  const playerSX = player.x;

  // Glow buckets when Granteater is near
  const nearLeft  = Math.abs(playerSX - lcx) < bw * 0.75;
  const nearRight = Math.abs(playerSX - rcx) < bw * 0.75;

  drawBucket(lcx, by, bw, bh, 'NOT FOR AI', '⚖ Judge • 🔒 Private • 📡 Live Data', '#8B3030', nearLeft);
  drawBucket(rcx, by, bw, bh, 'AI CAN HELP', '✏ Draft • 💡 Generate • 🔄 Transform', '#2a6e3a', nearRight);
  // (bucket tooltips removed — rules taught via popups before level starts)

  // Falling card
  if (GS.cardActive && GS.cardIndex < SORT_CARDS.length) {
    const card = SORT_CARDS[GS.cardIndex];
    drawFallingCard(card, GS.cardY); // uses GS.cardX internally

    // Move card down and drift toward player X
    if (!GS.popupOpen && GS.flashTimer <= 0) {
      // Pressing down skips the hover phase early
      if (GS.cardHoverTimer > 0 && (keys['ArrowDown'] || keys['KeyS'])) GS.cardHoverTimer = 0;
      if (GS.cardHoverTimer > 0) { GS.cardHoverTimer -= dt; return; }

      const dropSpeed = (keys['ArrowDown'] || keys['KeyS']) ? GS.cardSpeed * 4.5 : GS.cardSpeed;
      GS.cardY += dropSpeed;

      // Card X drifts toward player position (clamped to stay readable)
      const targetX = player.x;
      const cardCenterX = GS.cardX;
      GS.cardX += (targetX - cardCenterX) * 0.06;
      // Clamp so card never goes fully off screen
      const halfW = CARD_W() / 2;
      GS.cardX = Math.max(halfW + 10, Math.min(W - halfW - 10, GS.cardX));

      // Check if card arrived near bucket level
      const cardBottom = GS.cardY + CARD_H()/2;
      if (cardBottom >= by - 10) {
        // Evaluate: which side did the card land on?
        let sorted = null;
        if (nearLeft)  sorted = 'left';
        if (nearRight) sorted = 'right';
        // Also use card's own X position as tiebreak if player is in middle
        if (sorted === null) {
          if (GS.cardX < W * 0.4)       sorted = 'left';
          else if (GS.cardX > W * 0.6)  sorted = 'right';
        }
        if (sorted === null) {
          handleSort(card, 'miss');
        } else {
          const choseAI = (sorted === 'right');
          handleSort(card, choseAI === card.aiTask ? 'correct' : 'wrong');
        }
      }
    }
  }

  // Flash feedback
  if (GS.flashTimer > 0) {
    GS.flashTimer -= dt;
    const el = document.getElementById('feedback-flash');
    el.style.opacity = Math.min(1, GS.flashTimer / 20);
    if (GS.flashTimer <= 0) {
      el.style.opacity = 0;
      advanceCard();
    }
  }
}

function handleSort(card, result) {
  GS.cardActive = false;
  const correct = result === 'correct';
  const missed  = result === 'miss';

  if (correct) {
    GS.sortScore++;
    GS.cardSpeed = Math.min(4.5, GS.cardSpeed + 0.25);
    showFlash('✅', 'Correct!', card.feedback, true);
  } else {
    GS.hearts--;
    updateHeartsDisplay();
    if (missed) {
      showFlash('⏱️', 'Too slow!', card.feedback, false);
    } else {
      showFlash('❌', 'Not quite.', card.feedback, false);
    }
  }

  if (GS.hearts <= 0) {
    GS.flashTimer = 0;
    document.getElementById('feedback-flash').style.opacity = 0;
    setTimeout(() => showOutOfCapacity(), 300);
  }
}

function showFlash(icon, text, reason, good) {
  document.getElementById('flash-icon').textContent = icon;
  document.getElementById('flash-text').textContent = text;
  document.getElementById('flash-reason').textContent = reason;
  const el = document.getElementById('feedback-flash');
  el.style.background = good
    ? 'rgba(30,80,30,0.55)'
    : 'rgba(80,20,20,0.55)';
  el.style.opacity = 1;
  GS.flashTimer = 90; // frames
}

function advanceCard() {
  GS.cardIndex++;
  if (GS.sortScore >= 10) {
    showSortComplete();
  } else if (GS.cardIndex >= SORT_CARDS.length) {
    showSortComplete();
  } else {
    spawnCard();
  }
}

function spawnCard() {
  GS.cardY = CARD_H() / 2 + 60;
  GS.cardX = W / 2;
  GS.cardActive = true;
  GS.flashTimer = 0;
  GS.cardHoverTimer = 125; // ~2 seconds at 60fps
  document.getElementById('card-counter').textContent = GS.sortScore + ' / 10 ✓';
}

function updateHeartsDisplay() {
  const filled = '♥ '.repeat(GS.hearts).trim();
  const empty  = '♡ '.repeat(3 - GS.hearts).trim();
  document.getElementById('hearts-display').textContent = (filled + ' ' + empty).trim();
}

const L2_ROWS = ['R','I','C','E'];
const L2_ROW_LABELS = { R:'Role', I:'Instruction', C:'Context', E:'Expected Result' };
const L2_ADVANCE_THRESHOLD = 24; // out of 36
const L2_SCORE_LABELS = { 0:'Off-track', 1:'Okay', 2:'Good', 3:'Best' };
const L2_SCORE_COLORS = { 0:'#c0392b', 1:'#e67e22', 2:'#27ae60', 3:'#8e44ad' };
const L2_SCORE_ICONS  = { 0:'❌', 1:'🟡', 2:'🟢', 3:'⭐' };

let l2State = {
  tasks: [],          // 3 randomly chosen tasks
  taskIndex: 0,
  totalScore: 0,
  promptScores: [],   // score per prompt [0,1,2]
  // per-task state
  cards: {},          // { R: [...shuffled], I: [...], C: [...], E: [...] }
  flipped: {},        // { R: [bool,bool,...], I: [...], ... }
  selected: {},       // { R: cardIdx|null, I: ..., C: ..., E: ... }
  submitted: false,
};

function l2Init() {
  const shuffled = [...RICE_TASKS].sort(() => Math.random()-0.5);
  l2State.tasks = shuffled.slice(0,3);
  l2State.taskIndex = 0;
  l2State.totalScore = 0;
  l2State.promptScores = [];
  l2LoadTask();
}

function l2LoadTask() {
  const task = l2State.tasks[l2State.taskIndex];
  l2State.flipped   = {};
  l2State.selected  = {};
  l2State.submitted = false;
  L2_ROWS.forEach(row => {
    const shuffled = [...task.cards[row]].sort(() => Math.random()-0.5);
    l2State.cards[row] = shuffled;
    l2State.flipped[row]  = shuffled.map(() => false);
    l2State.selected[row] = null;
  });
  renderL2Screen();
}

function l2FlipCard(row, idx) {
  if (l2State.submitted) return;
  if (l2State.selected[row] === idx) {
    l2State.selected[row] = null;
  } else {
    l2State.selected[row] = idx;
  }
  renderL2Screen();
}

function l2AllSelected() {
  return L2_ROWS.every(row => l2State.selected[row] !== null);
}

function l2Submit() {
  if (!l2AllSelected() || l2State.submitted) return;
  l2State.submitted = true;
  const task = l2State.tasks[l2State.taskIndex];
  let promptScore = 0;
  const breakdown = {};
  L2_ROWS.forEach(row => {
    const card = l2State.cards[row][l2State.selected[row]];
    promptScore += card.score;
    breakdown[row] = card;
  });
  l2State.promptScores.push(promptScore);
  l2State.totalScore += promptScore;
  renderL2Feedback(task, breakdown, promptScore);
}

function l2Next() {
  l2State.taskIndex++;
  if (l2State.taskIndex >= l2State.tasks.length) {
    renderL2Complete();
  } else {
    l2LoadTask();
  }
}

// ─── RENDER FUNCTIONS ───────────────────

function renderL2Screen() {
  const task = l2State.tasks[l2State.taskIndex];
  const allSel = l2AllSelected();

  // Assembled prompt
  let assembled = '';
  L2_ROWS.forEach(row => {
    const idx = l2State.selected[row];
    if (idx !== null) assembled += (assembled ? ' ' : '') + l2State.cards[row][idx].text;
  });

  const assembledHtml = assembled
    ? `<div class="l2-assembled"><div class="l2-assembled-label">📝 ASSEMBLED PROMPT</div><div class="l2-assembled-text">${assembled}</div></div>`
    : `<div class="l2-assembled-placeholder">Your prompt will appear here as you select cards...</div>`;

  // Column headers (RICE across the top)
  const headersHtml = L2_ROWS.map(row => {
    const done = l2State.selected[row] !== null;
    return `<div class="l2-col-header ${done ? 'done' : ''}">
      <div class="l2-col-letter">${row}</div>
      <div class="l2-col-sublabel">${L2_ROW_LABELS[row]}</div>
    </div>`;
  }).join('');

  // Cards grid — one column per RICE letter, cards stacked vertically
  const granSrc = GRAN_IMG.src;
  const columnsHtml = L2_ROWS.map(row => {
    const cards = l2State.cards[row];
    const selIdx = l2State.selected[row];
    const cardsHtml = cards.map((card, i) => {
      const isSelected = selIdx === i;
      const wrapCls = ['l2-card-wrap', isSelected ? 'selected' : ''].filter(Boolean).join(' ');
      return `<div class="${wrapCls}" onclick="l2FlipCard('${row}',${i})">
        <div class="l2-card-inner">
          <div class="l2-card-face-back">
            <div class="l2-card-back-pattern"></div>
            <img class="l2-card-gran" src="${granSrc}" alt="Granteater" />
            <div class="l2-card-back-label">PROMPT QUEST</div>
          </div>
          <div class="l2-card-face-front">
            <div class="l2-card-front-text">${card.text}</div>
          </div>
        </div>
      </div>`;
    }).join('');
    return `<div class="l2-col-cards">${cardsHtml}</div>`;
  }).join('');

  const submitBtn = allSel
    ? `<button class="l2-submit-btn" onclick="l2Submit()">Build Prompt →</button>`
    : `<button class="l2-submit-btn disabled" disabled>Select one card per row</button>`;

  const progressDots = l2State.tasks.map((_,i) =>
    `<span class="l2-dot ${i < l2State.taskIndex ? 'done' : i === l2State.taskIndex ? 'active' : ''}"></span>`
  ).join('');

  document.getElementById('l2-screen').innerHTML = `
    <div class="l2-monitor">
      <div class="l2-monitor-chrome">
        <div class="l2-chrome-dot red"></div>
        <div class="l2-chrome-dot amber"></div>
        <div class="l2-chrome-dot green"></div>
        <div class="l2-chrome-title">copilot_prompt_builder.app</div>
      </div>
      <div class="l2-screen-inner">
        <div class="l2-task-bar">
          <div class="l2-task-label">GRANTEATER'S TASK</div>
          <div class="l2-task-text">${task.task}</div>
          <div class="l2-progress">${progressDots}<span class="l2-score-running">Score: ${l2State.totalScore}</span></div>
        </div>
        <div class="l2-board">
          <div class="l2-col-headers">${headersHtml}</div>
          <div class="l2-cards-grid">${columnsHtml}</div>
        </div>
        <div class="l2-bottom">
          ${assembledHtml}
          ${submitBtn}
        </div>
      </div>
    </div>
  `;
}


function renderL2Feedback(task, breakdown, promptScore) {
  const rowsHtml = L2_ROWS.map(row => {
    const card = breakdown[row];
    const icon = L2_SCORE_ICONS[card.score];
    const color = L2_SCORE_COLORS[card.score];
    const label = L2_SCORE_LABELS[card.score];
    return `<div class="l2-feedback-row" style="border-left:4px solid ${color};">
      <div class="l2-feedback-row-header">
        <span class="l2-feedback-letter" style="background:${color};">${row}</span>
        <span class="l2-feedback-label">${L2_ROW_LABELS[row]}</span>
        <span class="l2-feedback-score">${icon} ${label}</span>
      </div>
      <div class="l2-feedback-selected">"${card.text}"</div>
      <div class="l2-feedback-reason">${card.reason}</div>
    </div>`;
  }).join('');

  const isLast = l2State.taskIndex >= l2State.tasks.length - 1;
  const pct = Math.round((promptScore / 12) * 100);
  const scoreMsg = promptScore >= 10 ? '⭐ Excellent' : promptScore >= 7 ? '🟢 Good' : promptScore >= 5 ? '🟡 Okay' : '❌ Off-track';

  document.getElementById('l2-screen').innerHTML = `
    <div class="l2-monitor"><div class="l2-monitor-chrome"><div class="l2-chrome-dot red"></div><div class="l2-chrome-dot amber"></div><div class="l2-chrome-dot green"></div><div class="l2-chrome-title">copilot_prompt_builder.app</div></div><div class="l2-screen-inner"><div class="l2-feedback-screen">
      <div class="l2-feedback-header">
        <div class="l2-feedback-title">Prompt Score: ${promptScore}/12 <span class="l2-feedback-grade">${scoreMsg}</span></div>
        <div class="l2-feedback-bar-wrap"><div class="l2-feedback-bar" style="width:${pct}%;background:${promptScore>=10?'#8e44ad':promptScore>=7?'#27ae60':promptScore>=5?'#e67e22':'#c0392b'};"></div></div>
      </div>
      <div class="l2-feedback-rows">${rowsHtml}</div>
      <button class="l2-submit-btn" onclick="l2Next()">${isLast ? 'See Final Score →' : 'Next Prompt →'}</button>
    </div>
  `;
}

function renderL2Complete() {
  const total = l2State.totalScore;
  const max = 36;
  const pct = Math.round((total/max)*100);
  const passed = total >= L2_ADVANCE_THRESHOLD;
  const icon = pct >= 83 ? '🏆' : pct >= 67 ? '⭐' : pct >= 50 ? '🟢' : '💪';
  const msg = passed
    ? "Sharp prompting instincts. Granteater is ready to tackle the real thing."
    : "Good effort — review the RICE elements and try again to sharpen those prompts.";

  const promptBreakdown = l2State.promptScores.map((s,i) => {
    const pct2 = Math.round((s/12)*100);
    const col = s>=10?'#8e44ad':s>=7?'#27ae60':s>=5?'#e67e22':'#c0392b';
    return `<div class="l2-prompt-result"><span>Prompt ${i+1}</span><div class="l2-mini-bar-wrap"><div class="l2-mini-bar" style="width:${pct2}%;background:${col};"></div></div><span style="color:${col};font-weight:700;">${s}/12</span></div>`;
  }).join('');

  document.getElementById('l2-screen').innerHTML = `
    <div class="l2-monitor"><div class="l2-monitor-chrome"><div class="l2-chrome-dot red"></div><div class="l2-chrome-dot amber"></div><div class="l2-chrome-dot green"></div><div class="l2-chrome-title">copilot_prompt_builder.app</div></div><div class="l2-screen-inner" style="align-items:center;justify-content:center;"><div class="l2-complete">
      <div class="l2-complete-icon">${icon}</div>
      <div class="l2-complete-score">${total}<span class="l2-complete-max">/${max}</span></div>
      <div class="l2-complete-msg">${msg}</div>
      ${promptBreakdown}
      <div class="l2-rice-reminder">
        <span class="rice-badge rice-r">R</span> Role &nbsp;
        <span class="rice-badge rice-i">I</span> Instruction &nbsp;
        <span class="rice-badge rice-c">C</span> Context &nbsp;
        <span class="rice-badge rice-e">E</span> Expected Result
      </div>
      <button class="l2-submit-btn" onclick="restartL2()">${passed ? 'Play Again' : 'Try Again'}</button>
    </div>
  </div></div></div>
  `;
}

  document.getElementById('l2-screen').style.display = 'flex';

function rectHit(ax,ay,aw,ah,bx,by,bw,bh) {
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}

function updatePlayer(dt) {
  if (GS.popupOpen) return;
  player.vx=0;
  if (keys['ArrowLeft']||keys['KeyA'])  { player.vx=-SPD; player.facing=-1; }
  if (keys['ArrowRight']||keys['KeyD']) { player.vx= SPD; player.facing= 1; }

  player.vy = Math.min(player.vy + GRAVITY, 20);
  player.y += player.vy;
  player.x += player.vx;

  const gy=GY();
  player.onGround=false;
  if (player.y >= gy) { player.y=gy; player.vy=0; player.onGround=true; }

  checkBucketIntroPopups();
  player.x = Math.max(40, Math.min(W - 40, player.x));

  if(Math.abs(player.vx)>0&&player.onGround){
    player.fTimer+=dt;
    if(player.fTimer>12){player.frame=(player.frame+1)%2;player.fTimer=0;}
  }
}

function updateHUD() {
  const labels = { mission:'INTRO', sort:'LEVEL 1: SORT THE TASKS', rice:'LEVEL 2: BUILD THE PROMPT' };
  document.getElementById('hud-level').textContent = labels[GS.phase] || '';
  document.getElementById('hud-streak').textContent = GS.streak>=2?`🔥 ${GS.streak} streak`:'';
  document.getElementById('hud-progress').textContent = '';
}


function drawPauseOverlay() {
  if (!GS.paused) return;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'white';
  ctx.font = 'bold 20px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText('PAUSED', W/2, H/2 - 16);
  ctx.font = '11px "Press Start 2P"';
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fillText('PRESS SPACE TO RESUME', W/2, H/2 + 16);
}

function drawPauseOverlay(){
  if(!GS.paused)return;
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='white';ctx.font='bold 20px "Press Start 2P"';ctx.textAlign='center';
  ctx.fillText('PAUSED',W/2,H/2-16);
  ctx.font='11px "Press Start 2P"';ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.fillText('PRESS SPACE TO RESUME',W/2,H/2+16);
}
// ═══════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════
let last=0;
function loop(ts) {
  const dt=Math.min((ts-last)/16,3); last=ts;
  if (GS.phase==='rice') { requestAnimationFrame(loop); return; }
  if (GS.paused) { drawPauseOverlay(); requestAnimationFrame(loop); return; }
  resize();
  ctx.clearRect(0,0,W,H);
  drawOffice();
  if (GS.phase==='sort') drawSortLevel(dt);
  updatePlayer(dt);
  const sprScale=Math.min(W,H)/820;
  drawGranteater(ctx, player.x, player.y, Math.max(0.65, sprScale*1.25), player.frame, player.facing);
  updateHUD();
  requestAnimationFrame(loop);
}

function startGame(){
  document.getElementById('title-screen').classList.remove('active');
  document.getElementById('game-screen').classList.add('active');
  resize();player.y=GY();player.x=W/2;
  loopRunning=true; requestAnimationFrame(loop);
  setTimeout(()=>showMissionPopup(),400);
}
function restartGame(){
  Object.assign(GS,{phase:'mission',triggered:new Set(),taskIndex:0,score:0,streak:0,answered:false,popupOpen:false,hearts:3,cardIndex:0,cardActive:false,cardY:0,flashTimer:0,sortScore:0,paused:false,cardHoverTimer:0});
  player.x=W/2;player.y=GY();player.vx=0;player.vy=0;
  document.getElementById('bucket-hud').classList.remove('show');
  document.getElementById('feedback-flash').style.opacity=0;
  document.getElementById('l2-screen').style.display='none';
  canvas.style.display='block';
  document.getElementById('touch-controls').style.display='flex';
  document.getElementById('controls-hint').style.display='block';
  updateHeartsDisplay();closePopup();
  setTimeout(()=>showMissionPopup(),200);
}

function ensureGameScreen() {
  // Make sure game screen is active and state is sane
  document.getElementById('title-screen').classList.remove('active');
  document.getElementById('level-select-screen').classList.remove('active');
  document.getElementById('game-screen').classList.add('active');
  // Reset shared state
  GS.popupOpen = false; GS.paused = false;
  document.getElementById('popup-overlay').classList.remove('show');
  document.getElementById('feedback-flash').style.opacity = 0;
  canvas.style.display = 'block';
  document.getElementById('l2-screen').style.display = 'none';
  document.getElementById('touch-controls').style.display = 'flex';
  document.getElementById('controls-hint').style.display = 'block';
  document.getElementById('bucket-hud').classList.remove('show');
  resize();
  if (!loopRunning) { loopRunning = true; requestAnimationFrame(loop); }
}

function openLevelSelect() {
  // Pause everything, show level select overlay
  GS.paused = true;
  GS.popupOpen = false;
  document.getElementById('popup-overlay').classList.remove('show');

  document.getElementById('game-screen').classList.remove('active');
  document.getElementById('title-screen').classList.remove('active');
  const ls = document.getElementById('level-select-screen');
  ls.classList.add('active');

  // Build the button list
  const list = document.getElementById('level-select-list');
  list.innerHTML = LEVELS.map(l => `
    <button class="ls-btn" onclick="launchLevel(${LEVELS.indexOf(l)})">
      <div class="ls-btn-num">${l.num}</div>
      <div class="ls-btn-info">
        <div class="ls-btn-title">${l.title}</div>
        <div class="ls-btn-desc">${l.desc}</div>
      </div>
      <div class="ls-btn-tag" style="background:${l.tagColor}20;color:${l.tagColor};border:1px solid ${l.tagColor}60;">${l.tag}</div>
    </button>
  `).join('');
}

function launchLevel(idx) {
  GS.paused = false;
  LEVELS[idx].fn();
}

function showTitleFromLevelSelect() {
  document.getElementById('level-select-screen').classList.remove('active');
  document.getElementById('title-screen').classList.add('active');
}
